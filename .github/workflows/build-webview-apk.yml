name: Build WebView APK

on:
  push:
    branches: [main]
    paths: ['mobile-webview/**', 'public/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-webview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy PWA to assets
        run: |
          mkdir -p app/src/main/assets
          cp ../public/index.html app/src/main/assets/
          cp ../public/manifest.json app/src/main/assets/ 2>/dev/null || true
          cp ../public/sw.js app/src/main/assets/ 2>/dev/null || true

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.9

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: geniearchi-webview-apk
          path: mobile-webview/app/build/outputs/apk/release/*.apk

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-webview/app/build/outputs/apk/release/*.apk
